name: Refresh ECI snapshot

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # also runnable manually

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Re-fetch + rebuild snapshot
        run: bash scripts/refresh.sh

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/constituencies.json index.html)" ]]; then
            git add data/constituencies.json index.html
            git commit -m "chore: refresh ECI snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "no changes"
          fi
