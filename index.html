<style>
  :root {

    --border: #262c38;

    --warn: #f0b400;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --panel-2: #f0f3f8;
      --text: #1a1d24;
      --muted: #5b6478;
      --accent: #1f5cd6;
      --border: #e3e6ee;
      --good: #1d9b58;
      --warn: #b27a00;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               font-size: 15px; line-height: 1.45; }
  header { padding: 18px 20px 8px; border-bottom: 1px solid var(--border);

  .sub { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
  .sub a { color: var(--accent); text-decoration: none; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #search { flex: 1 1 320px; min-width: 220px; padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--border); background: var(--panel); color: var(--text);
            font-size: 15px; outline: none; }
  #search:focus { border-color: var(--accent); }
  button { padding: 9px 14px; border-radius: 8px; border: 1px solid var(--border);
           background: var(--panel); color: var(--text); font-size: 13px; cursor: pointer; }
  button:hover { background: var(--panel-2); }
  button.primary { border-color: var(--accent); color: var(--accent); }
  .tally { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; padding-bottom: 10px; }
  .tally .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
                 border-radius: 999px; font-size: 12px; background: var(--panel);
                 border: 1px solid var(--border); cursor: pointer; user-select: none; }
  .tally .chip.active { outline: 2px solid var(--accent); outline-offset: -1px; }
  .tally .chip .dot { width: 10px; height: 10px; border-radius: 50%; }
  .tally .chip .n { color: var(--muted); font-variant-numeric: tabular-nums; }
  .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  main { padding: 14px 20px 60px; max-width: 1100px; margin: 0 auto; }
  .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
             gap: 10px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
          padding: 12px 14px; }
  .card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .card .name { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .card .acno { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
  .card .district { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .card .row { display: flex; justify-content: space-between; align-items: center;
               margin-top: 8px; gap: 8px; font-size: 13px; }
  .card .row .who { display: flex; flex-direction: column; min-width: 0; }
  .card .row .who .cand { white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                          max-width: 220px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px;
           border-radius: 6px; font-size: 11px; font-weight: 600; color: #fff;
           white-space: nowrap; }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.65); }
  .card .footer { display: flex; justify-content: space-between; margin-top: 10px;
                  font-size: 12px; color: var(--muted); }
  .card .footer .margin { color: var(--text); font-variant-numeric: tabular-nums; }
  .card .footer .status.declared { color: var(--good); }
  .card .footer .status.progress { color: var(--warn); }
  .empty { text-align: center; color: var(--muted); padding: 40px; }
  .hint { color: var(--muted); font-size: 12px; margin-left: auto; }
  kbd { background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px;
        padding: 1px 5px; font-size: 11px; font-family: ui-monospace, monospace; }
</style>

<script>
const PARTY_COLORS = {
  TVK:    "#e0143c",  // red
  DMK:    "#d31a1a",  // red-black
  ADMK:   "#0a7e3d",  // green (two-leaves)
  PMK:    "#f0b400",  // yellow/mango
  INC:    "#1c7cd6",  // sky blue
  IUML:   "#2bd47b",  // green
  CPI:    "#b30000",  // red
  "CPI(M)": "#a30000",
  VCK:    "#0d3b8c",  // dark blue
  BJP:    "#f57c00",  // saffron
  DMDK:   "#7a1fa2",  // purple
  AMMK:   "#ec407a",  // pink
  IND:    "#5b6478",
};

const PROXY = "https://r.jina.ai/";
const BASE = "https://results.eci.gov.in/ResultAcGenMay2026/";
const NUM_PAGES = 12;

const PARTY_TAIL_RE = /\s*i\s*###[\s\S]*$/;
const PARTY_ABBR = {
  "Tamilaga Vettri Kazhagam": "TVK",
  "Dravida Munnetra Kazhagam": "DMK",
  "All India Anna Dravida Munnetra Kazhagam": "ADMK",
  "Pattali Makkal Katchi": "PMK",
  "Indian National Congress": "INC",
  "Indian Union Muslim League": "IUML",
  "Communist Party of India": "CPI",
  "Communist Party of India (Marxist)": "CPI(M)",
  "Communist Party of India  (Marxist)": "CPI(M)",
  "Viduthalai Chiruthaigal Katchi": "VCK",
  "Bharatiya Janata Party": "BJP",
  "Desiya Murpokku Dravida Kazhagam": "DMDK",
  "Amma Makkal Munnettra Kazagam": "AMMK",
  "Independent": "IND",
};

let DATA = JSON.parse(document.getElementById("bootstrap-data").textContent);
let META = JSON.parse(document.getElementById("bootstrap-meta").textContent);
let activeParty = null;

const $ = (id) => document.getElementById(id);
const search = $("search"), results = $("results"), empty = $("empty"),
      tally = $("tally"), meta = $("meta"), statusEl = $("status");

function partyColor(p) { return PARTY_COLORS[p] || "#5b6478"; }

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderTally() {
  const counts = {};
  for (const r of DATA) counts[r.leading_party] = (counts[r.leading_party] || 0) + 1;
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  tally.innerHTML = sorted.map(([p, n]) => {
    const cls = activeParty === p ? "chip active" : "chip";
    return `<span class="${cls}" data-party="${p}">
      <span class="dot" style="background:${partyColor(p)}"></span>
      <strong>${p}</strong> <span class="n">${n}</span>
    </span>`;
  }).join("");
  for (const chip of tally.querySelectorAll(".chip")) {
    chip.addEventListener("click", () => {
      const p = chip.getAttribute("data-party");
      activeParty = activeParty === p ? null : p;
      renderTally();
      render();
    });
  }
  const declared = DATA.filter(r => r.status === "Result Declared").length;
  meta.textContent = `${declared} of ${DATA.length} declared · ${snapshotLabel()} · click a party chip to filter`;
}

function snapshotLabel() {
  if (!META.built_at) return "snapshot age unknown";
  const t = new Date(META.built_at);
  if (isNaN(t)) return "snapshot age unknown";
  const ageMs = Date.now() - t.getTime();
  const mins = Math.round(ageMs / 60000);
  let rel;
  if (mins < 1) rel = "just now";
  else if (mins < 60) rel = `${mins} min ago`;
  else if (mins < 60 * 24) rel = `${Math.round(mins / 60)} h ago`;
  else rel = `${Math.round(mins / (60 * 24))} d ago`;
  return `snapshot ${rel} (${t.toLocaleString(undefined, {
    dateStyle: "medium", timeStyle: "short",
  })})`;
}

function matches(r, q) {
  if (!q) return true;
  const hay = [
    r.name, r.district, r.leading_candidate, r.leading_party, r.leading_party_full,
    r.trailing_candidate, r.trailing_party, r.trailing_party_full, String(r.ac_no)
  ].join(" ").toLowerCase();
  return q.split(/\s+/).filter(Boolean).every(tok => hay.includes(tok));
}

function rowCard(r) {
  const lc = partyColor(r.leading_party);
  const tc = partyColor(r.trailing_party);
  const decl = r.status === "Result Declared";
  return `
    <div class="card">
      <div class="top">
        <div>
          <div class="name">${escapeHtml(r.name)}</div>
          <div class="district">${escapeHtml(r.district || "—")} · AC ${r.ac_no}</div>
        </div>
      </div>
      <div class="row">
        <div class="who">
          <span class="cand">${escapeHtml(r.leading_candidate)}</span>
        </div>
        <span class="badge" style="background:${lc}">
          <span class="dot"></span>${escapeHtml(r.leading_party)}
        </span>
      </div>
      <div class="row">
        <div class="who">
          <span class="cand" style="color:var(--muted)">${escapeHtml(r.trailing_candidate)}</span>
        </div>
        <span class="badge" style="background:${tc};opacity:.7">
          <span class="dot"></span>${escapeHtml(r.trailing_party)}
        </span>
      </div>
      <div class="footer">
        <span class="margin">margin ${r.margin.toLocaleString("en-IN")}</span>
        <span class="status ${decl ? 'declared' : 'progress'}">${escapeHtml(r.status)} (${escapeHtml(r.round)})</span>
      </div>
    </div>`;
}

function render() {
  const q = search.value.trim().toLowerCase();
  let rows = DATA.filter(r => matches(r, q));
  if (activeParty) rows = rows.filter(r => r.leading_party === activeParty);
  rows.sort((a, b) => a.ac_no - b.ac_no);
  results.innerHTML = rows.map(rowCard).join("");
  empty.style.display = rows.length ? "none" : "block";
}

search.addEventListener("input", render);

// Live refresh from ECI via Jina proxy
const cleanParty = (raw) => {
  const name = raw.replace(PARTY_TAIL_RE, "").trim();
  return { full: name, abbr: PARTY_ABBR[name] || name };
};

// Jina occasionally serves a no-table render where each row is one long
// line of plain text. Fall back to a regex parser for those.
const TRENDS_SPLIT = /\s*i\s*###\s*Party Wise State Trends\s*/;
const TRENDS_TAIL  = /^Leading In:\d+ Won In:\d+ Trailing In:\d+\s*/;
// Match longest party names first so "All India Anna Dravida Munnetra Kazhagam"
// wins over a shorter prefix.
const PARTY_NAMES = Object.keys(PARTY_ABBR).sort((a, b) => b.length - a.length);
const PARTY_RE = new RegExp(
  PARTY_NAMES.map(p => p.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|")
);
const STATUS_RE = /\s+(\d+)\s+(\d+\/\d+)\s+(Result Declared|Result in Progress)\s*$/;

function splitCandParty(chunk) {
  // chunk = "<CANDIDATE> <PARTY_FULL>" — find party name as suffix.
  const m = chunk.match(PARTY_RE);
  if (!m) return null;
  // Pick the rightmost match so the candidate name (which can include
  // capital words like "DR." or "K.A.") doesn't get mistaken for a party.
  let last = m, idx = chunk.indexOf(m[0]);
  for (let pos = idx + 1; ;) {
    const next = chunk.slice(pos).match(PARTY_RE);
    if (!next) break;
    last = next; idx = pos + chunk.slice(pos).indexOf(next[0]); pos = idx + 1;
  }
  return { cand: chunk.slice(0, idx).trim().replace(/\s+$/, ""), party: last[0] };
}

function parseNakedRow(line) {
  const parts = line.split(TRENDS_SPLIT);
  if (parts.length !== 3) return null;
  const tail = STATUS_RE.exec(parts[2]);
  if (!tail) return null;
  const [, margin, round, status] = tail;

  // chunk 0: "<NAME> <AC#> <LCAND> <LPARTY>"
  const m0 = parts[0].match(/^(.+?)\s*(\d{1,3})\s+(.*)$/);
  if (!m0) return null;
  const name = m0[1].trim();
  const acNo = parseInt(m0[2], 10);
  const ll = splitCandParty(m0[3]);
  if (!ll) return null;

  // chunk 1: "Leading In:N Won In:N Trailing In:N <TCAND> <TPARTY>"
  const c1 = parts[1].replace(TRENDS_TAIL, "");
  const tt = splitCandParty(c1);
  if (!tt) return null;

  return {
    ac_no: acNo, name,
    leading_candidate: ll.cand,
    leading_party: PARTY_ABBR[ll.party] || ll.party,
    leading_party_full: ll.party,
    trailing_candidate: tt.cand,
    trailing_party: PARTY_ABBR[tt.party] || tt.party,
    trailing_party_full: tt.party,
    margin: parseInt(margin, 10),
    round, status,
  };
}

function parsePage(md) {
  const out = [];
  const seen = new Set();
  for (const line of md.split("\n")) {
    let row = null;
    if (line.startsWith("| ") && !line.includes("Const. No.") && !line.includes("Status Known")) {
      const cells = line.replace(/^\|/, "").replace(/\|$/, "").split("|").map(s => s.trim());
      if (cells.length >= 9 && /^\d+$/.test(cells[1])) {
        const [name, no, lc, lp, tc, tp, margin, round, status] = cells;
        const lead = cleanParty(lp), trail = cleanParty(tp);
        row = {
          ac_no: parseInt(no, 10), name,
          leading_candidate: lc,
          leading_party: lead.abbr, leading_party_full: lead.full,
          trailing_candidate: tc,
          trailing_party: trail.abbr, trailing_party_full: trail.full,
          margin: /^\d+$/.test(margin) ? parseInt(margin, 10) : 0,
          round, status,
        };
      }
    } else if (TRENDS_SPLIT.test(line) && STATUS_RE.test(line)) {
      row = parseNakedRow(line);
    }
    if (row && !seen.has(row.ac_no)) {
      seen.add(row.ac_no);
      out.push(row);
    }
  }
  return out;
}

async function refresh() {
  const btn = $("refresh");
  btn.disabled = true;
  statusEl.textContent = "Fetching live data…";
  try {
    // Cache-bust so Jina re-fetches; some cached responses lose the | table format.
    const stamp = Date.now();
    const pages = await Promise.all(
      Array.from({ length: NUM_PAGES }, (_, i) =>
        fetch(`${PROXY}${BASE}statewiseS22${i + 1}.htm?_=${stamp}`).then(r => r.text())
      )
    );
    const fresh = pages.flatMap(parsePage);
    if (fresh.length < 200) throw new Error(`Only got ${fresh.length} rows`);
    // Preserve district from existing data
    const distByAc = Object.fromEntries(DATA.map(r => [r.ac_no, r.district]));
    for (const r of fresh) r.district = distByAc[r.ac_no] || "";
    DATA = fresh.sort((a, b) => a.ac_no - b.ac_no);
    META = { built_at: new Date().toISOString() };
    renderTally(); render();
    statusEl.textContent = `Updated · ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    statusEl.textContent = "Refresh failed: " + e.message;
  } finally {
    btn.disabled = false;
  }
}

$("refresh").addEventListener("click", refresh);

renderTally();
render();
// keep "snapshot N min ago" fresh without re-rendering cards
setInterval(renderTally, 60_000);
</script>
</body>
